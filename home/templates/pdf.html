<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUU" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cloudflare.com/6b9e5c8c1e7f4d2b9a0f1c3e8a9b0d.css" integrity="sha384-abc123" crossorigin="anonymous">
    <!--add bootstrap styles for PDF generation-->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .container{
            margin: 0 auto;
            width: 80%;
        }
        .expense-table {
            margin-top: 20px;
        }
        .expense-conatainer {
            margin-top: 20px;
        }
        .expense-header {
            font-size: 1.5em;
            margin-bottom: 10px;
        }.expense-header {
            text-align: center;
        }

        .expense-title {
            font-size: 24px;
            color: #333;
            margin-top: 20px;
        }

        .expense-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        .expense-table th,
        .expense-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .expense-total {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 20px;
        }

        .expense-footer {
            margin-top: 20px;
            font-size: 16px;
            color: #555;
        }

        .btn-print {
            margin-left: 48%;
            margin-top: 2%;
        }

        img {
            width: 140px;
            height: 150px;
        }

        #date {
            margin-left: 120px;
        }
    </style>
</head>
<body>
    <div class="containr expenses-container">
        <div class="expenses-header">
            <img src="https://i.ibb.co/7QJjfxV/images-1.jpg" alt="">
            <div class="expenses-title">
                <h4>{{ user.first_name }},your financial summary {{ user.last_name }}</h4>
            </div>
        </div>
        <br><br>
        <div class="expense-table">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td>{{ expense.description }}</td>
                        <td>{{ expense.amount }}</td>
                        <td>{{ expense.date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <p class="expenses-footer">Generated on {{ today|date:'Y-m-d' }}</p>
        </div>
    </div>
    <!-- add bootstrap js and query-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5+">
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUU" crossorigin="anonymous"></script>    
    
</body>
</html>
