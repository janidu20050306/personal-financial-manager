<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com/6b9e5c8c1e7f4d2b9a0f1c3e8a9b0d.css" integrity="sha384-abc123" crossorigin="anonymous">
    <title>job portal</title>
</head>
<body>
    <br><br><br><br>
    <div class="container mt-4 bg-white mx-auto col-md-3 card shadow p-3">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger" role="alert">
            {{message}}
        </div>
        {% endfor %}
        {% endif %}
        <form action="" method="post">
            {% csrf_token %}
            <h4 class="text-center">Register</h4>
            <div class="from-group">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="from-group">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="from-group">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div><br>
             <div class="from-group">
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required><br>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</body>
</html>
