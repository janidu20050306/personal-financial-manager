{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUU" crossorigin="anonymous">
<link rel="stylesheet" href="https://cloudflare.com/6b9e5c8c1e7f4d2b9a0f1c3e8a9b0d.css" integrity="sha384-abc123" crossorigin="anonymous">
<style>
    .update-form {
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
        background-color: #f8f9fa;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
</style>
<div class="container mt-5 col-5">
    <div class="update-form card shadow p-4">
        <h4 class="text-center mb-4">Update Expense</h4>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="salary" class="form-label">Salary</label>
                <input type="number" step="0.01" name="salary" id="salary" class="form-control" value="{{ expense.salary }}" required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" name="name" id="name" class="form-control" value="{{ expense.name }}" required>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" name="price" id="price" class="form-control" value="{{ expense.price }}" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Expense</button>
        </form>
    </div>
{% endblock %}
