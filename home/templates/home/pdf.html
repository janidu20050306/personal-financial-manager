{% extends "home/base.html" %}

{% block content %}
<style>
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }
    th {
        background-color: #f2f2f2;
    }
    .expense-total {
        font-size: 20px;
        font-weight: bold;
        color: #333;
        margin-top: 20px;
    }
    .btn-print {
        margin-top: 20px;
    }
</style>

<div class="container">
    <h1>Expenses Summary for {{ username }}</h1>
    <table class="table">
        <thead>
            <tr>
                <th>S.no</th>
                <th>Expense Name</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ expense.name }}</td>
                <td>${{ expense.price }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="expense-total">
        Total Expenses: ${{ total_sum }}
    </div>
    <button onclick="window.print()" class="btn btn-primary btn-print">Print / Save as PDF</button>
    <a href="{% url 'home' %}" class="btn btn-secondary btn-print">Back to Expenses</a>
</div>
{% endblock %}
