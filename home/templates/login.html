<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUU" crossorigin="anonymous" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com/6b9e5c8c1e7f4d2b9a0f1c3e8a9b0d.css" integrity="sha384-abc123" crossorigin="anonymous">
    <title>job portal</title>
</head>
<body>
    <br><br><br><br>
    <div class="login-form">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger" role="alert">
            {{message}}
        </div>
        {% endfor %}
        {% endif %}
    <form action="" method ="post">
        {% csrf_token %}
        <h4 class="text-center">Login</h4>
        <div class="from-group">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="from-group">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="text-center"><a href="{% url 'register' %}">Don't have an account? Register here.</a></p>

</body>
</html>
